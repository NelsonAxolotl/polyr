<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Compagnie Poly R propose des spectacles mêlant les arts de la scène avec comme principales disciplines le chant opératique, la danse, le théâtre et également les marionnettes."
    />

    <meta
      name="keywords"
      content="compagnie spectacle Loire, opéra, théâtre, marionnettes, compagnie Poly R"
    />

    <meta name="author" content="Compagnie Poly R" />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
      default-src 'self';
script-src 'self' https://vercel.live;
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
img-src 'self' data:;
font-src 'self' https://fonts.gstatic.com;
connect-src 'self';
object-src 'none';
base-uri 'self';
"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://compagniepolyr.fr" />

    <!-- hreflang -->
    <link
      rel="alternate"
      href="https://compagniepolyr.fr"
      hreflang="x-default"
    />
    <link rel="alternate" href="https://compagniepolyr.fr" hreflang="fr" />
    <link rel="alternate" href="https://compagniepolyr.fr" hreflang="fr-FR" />

    <!-- Open Graph -->
    <meta property="og:title" content="Poly R - Spectacles Éblouissants" />
    <meta
      property="og:description"
      content="Découvrez les spectacles de la Compagnie Poly R."
    />
    <meta property="og:image" content="https://compagniepolyr.fr/logo.webp" />
    <meta property="og:image:alt" content="Logo Compagnie Poly R" />
    <meta property="og:url" content="https://compagniepolyr.fr" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Compagnie Poly R" />
    <meta
      name="twitter:description"
      content="Découvrez les spectacles et événements de la Compagnie Poly R."
    />
    <meta name="twitter:image" content="https://compagniepolyr.fr/logo.webp" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Rye&family=Caveat:wght@400..700&display=swap"
      rel="stylesheet"
    />

    <title>Compagnie Poly R</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
